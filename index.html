<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FriGame Tracker</title>
    <link rel="stylesheet" href="styles.css">
	<script type="module" src="script.js"></script>
</head>
<body>

<header>
    <label>
        <button id="btn-reset-points">Reset Points</button>
        <button id="btn-allocate-players">Allocate Players</button>
        <button id="btn-add-player">Add Player</button>
        <button id="btn-remove-player">Remove Player</button>
    </label>

</header>

<div id="timers">
    Game timer:
    <div id="game-timer">00:00</div>
    Point interval timer:
    <div id="countdown">00:00</div>

</div>

<div id="active-players">
</div>

<div class="controls">
    <div>
        <label>
        Point interval timer:
        <input id="target-interval" type="number" min="0" value="5" />
        minutes.
        </label>
    </div>
    <div>
        <label>
            Game duration timer:
            <input id="target-time" type="number" min="0" value="5" />
            minutes.
        </label>
    </div>
</div>

<div>
    <button id="btn-apply-initial">Apply</button>
    <button id="btn-pause-resume">Pause</button>
</div>


<div id="interval-counter"></div>

<div id="removed-players">
</div>
<audio id="alarm-sound" src="alarm.mp3" preload="auto"></audio>
<audio id="alarm-ruin-sound" src="alarmRuin.mp3" preload="auto"></audio>
</body>
</html>
